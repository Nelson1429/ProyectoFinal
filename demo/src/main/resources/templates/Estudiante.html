<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">

<body>
  <div layout:fragment="contenido" class="container my-5">

    <!-- Bienvenida -->
    <div class="text-center mb-5">
      <h1 class="fw-bold">
        ¡Bienvenido/a,<span sec:authentication="principal.nombre">Usuario</span> 👩‍🍳!
      </h1>
      <p class="lead text-muted">
        Aquí puedes ver tus cursos disponibles y gestionar tu cuenta.
      </p>
    </div>

    <!-- Opciones -->
    <div class="row g-4 justify-content-center">

      <!-- Ver Cursos Disponibles -->
      <div class="col-md-5">
        <div class="card shadow-sm border-0 h-100 text-center">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title fw-semibold">Ver Cursos Disponibles</h5>
              <p class="card-text text-muted">
                Consulta todos los cursos de cocina activos e inscríbete.
              </p>
            </div>
            <a th:href="@{/cursos}" class="btn btn-primary mt-3">
              Ver Cursos Disponibles
            </a>
          </div>
        </div>
      </div>

      <!-- Mis Cursos -->
      <div class="col-md-5">
        <div class="card shadow-sm border-0 h-100 text-center">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title fw-semibold">Mis Cursos</h5>
              <p class="card-text text-muted">
                Accede a los cursos en los que estás inscrito/a actualmente.
              </p>
            </div>
            <a th:href="@{/mis-cursos}" class="btn btn-success mt-3">
              Ver Mis Cursos
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
