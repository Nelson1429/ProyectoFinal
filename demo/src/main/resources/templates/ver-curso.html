<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title layout:fragment="titulo" th:text="${curso.nombre} + ' - Contenido'"></title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
            --accent-color: #28a745;
        }

        .course-header {
            background: var(--primary-gradient);
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            border-bottom: 4px solid var(--accent-color);
        }

        .module-card {
            border: none;
            border-radius: 15px;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .module-header {
            background: white !important;
            padding: 1.5rem;
            cursor: pointer;
            border-radius: 15px !important;
        }

        .module-header:hover {
            background: #f8f9fa !important;
        }

        .lesson-item {
            padding: 1rem 1.5rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lesson-item:hover {
            border-left-color: var(--accent-color);
            background: #f1f8f4;
        }

        .content-badge {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
        }

        .badge-video {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-text {
            background: #e0f2fe;
            color: #0284c7;
        }

        .badge-pdf {
            background: #fef3c7;
            color: #d97706;
        }

        .sidebar-info {
            position: sticky;
            top: 100px;
        }
    </style>
</head>

<body>
    <main layout:fragment="contenido">
        <!-- Header del Curso -->
        <header class="course-header">
            <div class="container text-center">
                <span class="badge bg-success mb-2" th:text="${curso.aprendizaje}">Nivel</span>
                <h1 class="display-4 fw-bold mb-3" th:text="${curso.nombre}">Nombre del Curso</h1>
                <p class="lead opacity-75 mx-auto" style="max-width: 700px;" th:text="${curso.detalle}">Detalle breve.
                </p>
            </div>
        </header>

        <div class="container mb-5">
            <div class="row g-4">
                <!-- Columna Principal: Módulos -->
                <div class="col-lg-8">
                    <h3 class="fw-bold mb-4">📖 Contenido del Curso</h3>

                    <div th:if="${#lists.isEmpty(curso.modulos)}" class="text-center py-5 bg-light rounded-4">
                        <i class="fas fa-book-open fa-3x text-muted mb-3"></i>
                        <p class="text-muted">Próximamente estaremos publicando el contenido detallado de este curso.
                        </p>
                    </div>

                    <div class="accordion" id="accordionModulos">
                        <div class="card module-card" th:each="modulo, iter : ${curso.modulos}">
                            <div class="module-header d-flex align-items-center" data-bs-toggle="collapse"
                                th:data-bs-target="'#collapse' + ${modulo.id}">
                                <div class="flex-grow-1">
                                    <h5 class="mb-0 fw-bold"
                                        th:text="'Módulo ' + ${iter.index + 1} + ': ' + ${modulo.nombre}">Nombre del
                                        Módulo</h5>
                                    <small class="text-muted"
                                        th:text="${#lists.size(modulo.lecciones)} + ' lecciones'"></small>
                                </div>
                                <i class="fas fa-chevron-down text-muted"></i>
                            </div>

                            <div th:id="'collapse' + ${modulo.id}" class="collapse" data-bs-parent="#accordionModulos">
                                <div class="card-body p-0 border-top">
                                    <div class="lesson-item" th:each="leccion : ${modulo.lecciones}">
                                        <div class="d-flex align-items-center">
                                            <i class="fas fa-play-circle me-3 text-success"
                                                th:if="${leccion.contenidoTipo == 'video'}"></i>
                                            <i class="fas fa-file-alt me-3 text-info"
                                                th:if="${leccion.contenidoTipo == 'texto'}"></i>
                                            <i class="fas fa-file-pdf me-3 text-danger"
                                                th:if="${leccion.contenidoTipo == 'pdf'}"></i>
                                            <span th:text="${leccion.nombre}">Nombre de la lección</span>
                                        </div>
                                        <span th:class="'content-badge badge-' + ${leccion.contenidoTipo}"
                                            th:text="${leccion.contenidoTipo == 'video' ? 'VIDEO' : (leccion.contenidoTipo == 'pdf' ? 'PDF' : 'LECTURA')}">
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Barra Lateral: Info Adicional -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 rounded-4 sidebar-info">
                        <img th:src="${curso.imagen}" class="card-img-top rounded-top-4" alt="Curso">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Sobre este curso</h5>
                            <ul class="list-unstyled mb-4">
                                <li class="mb-2"><i class="fas fa-clock text-success me-2"></i> <strong
                                        th:text="${curso.duracion}">Duración</strong></li>
                                <li class="mb-2"><i class="fas fa-graduation-cap text-success me-2"></i> Certificado de
                                    finalización</li>
                                <li class="mb-2"><i class="fas fa-check-circle text-success me-2"></i> Acceso de por
                                    vida</li>
                            </ul>
                            <div class="d-grid">
                                <a href="/mis-cursos" class="btn btn-outline-dark rounded-pill">
                                    <i class="fas fa-arrow-left me-2"></i> Volver a mis cursos
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
