<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sabor MasterClass</title>

  <!-- Bootstrap + FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" th:href="@{/css/Home.css}">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 fixed-top shadow-sm">
    <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
      <img th:src="@{/imagenes/logo-sabor1.jpg}" height="70" class="me-2 rounded-circle" />
      <span class="fs-4 fw-semibold">SaborMasterClass</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <a th:href="@{/logout}" class="btn btn-outline-light me-2">Cerrar Sesión</a>
      <a th:href="@{/home}" class="btn btn-light">Inicio</a>
    </div>
  </nav>  

  <!-- Contenido dinámico -->
  <main class="container" style="padding-top: 110px; padding-bottom: 100px;" layout:fragment="contenido">
    <!-- Aquí se inyecta el contenido de admin/estudiante -->
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-center fixed-bottom">
    <div class="container d-flex flex-column justify-content-center align-items-center py-3">
      <div class="d-flex gap-4 mb-2">
        <i class="fab fa-whatsapp text-white fs-4"></i>
        <i class="fab fa-facebook text-white fs-4"></i>
        <i class="fab fa-x-twitter text-white fs-4"></i>
        <i class="fab fa-instagram text-white fs-4"></i>
        <i class="fab fa-youtube text-white fs-4"></i>
        <i class="fab fa-tiktok text-white fs-4"></i>
      </div>
      <p class="text-white mb-0 small">
        SaborMasterClass. Todos los derechos reservados. Desarrollado por HAMN
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
