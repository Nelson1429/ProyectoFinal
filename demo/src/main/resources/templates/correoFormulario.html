<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enviar Correo - SaborMasterClass</title>

    <style>
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .card-form {
            max-width: 600px;
            margin: 50px auto;
            background: #111;
            padding: 30px;
            border-radius: 22px;
            color: white;
            box-shadow: 0 0 25px rgba(123, 44, 191, 0.35);
        }

        h1.title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #1c1c1e;
            color: #e5e5e7;
            border: 1px solid #2C2C2E;
            border-radius: 12px;
        }

        .btn-send-text {
            width: 100%;
            margin-top: 20px;
            background: #7B2CBF;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-send-text:hover {
            background: #9A42E5;
        }

        .toast {
            font-size: 16px;
        }
    </style>
</head>

<body>
<section layout:fragment="contenido">

    <main>
        <div class="card-form">
            <h1 class="title">Enviar Correo</h1>

            <form th:action="@{/correo/enviar-desde-vista}" method="post">

                <label>Para</label>
                <input type="email" name="para" placeholder="destinatario@ejemplo.com" required>

                <label>Asunto</label>
                <input type="text" name="asunto" placeholder="Asunto del correo" required>

                <label>Mensaje</label>
                <textarea name="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>

                <button type="submit" name="tipo" value="texto" class="btn-send-text">
                    Enviar correo
                </button>

            </form>
        </div>
    </main>

    <!-- TOAST PARA MENSAJES -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 2000">
        <div id="toastMensaje" class="toast align-items-center text-bg-success border-0">
            <div class="d-flex">
                <div class="toast-body" id="toastTexto"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted">
        © 2025 SaborMasterClass
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const msg = "[[${mensaje}]]";
            const tipo = "[[${tipoMensaje}]]";

            if (msg !== "" && msg !== "null") {
                const toastElement = document.getElementById("toastMensaje");
                const toastBody = document.getElementById("toastTexto");

                toastBody.textContent = msg;

                if (tipo === "error") {
                    toastElement.classList.remove("text-bg-success");
                    toastElement.classList.add("text-bg-danger");
                }

                const toast = new bootstrap.Toast(toastElement);
                toast.show();
            }
        });
    </script>

</section>
</body>
</html>
