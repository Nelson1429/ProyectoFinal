<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <title>Enviar Correo - SaborMasterClass</title>
</head>

<body>
    <section layout:fragment="contenido">

        <!-- HERO SECTION (ESTILO GLOBAL IGUAL A CONTACTO) -->
        <!-- Se sustituye el diseño antiguo por el hero-img-section definido en Home.css -->
        <section class="hero-img-section">
            <div class="overlay"></div>
            <div class="hero-content">
                <h1>Enviar Correo</h1>
                <p>
                    <i class="fas fa-envelope me-2"></i>
                    Completa los campos para enviar un mensaje
                    <i class="fas fa-paper-plane ms-2"></i>
                </p>
            </div>
        </section>

        <!-- CONTENIDO PRINCIPAL (CENTRADITO Y SIN TARJETA LATERAL) -->
        <!-- Se ajusta la columna a col-md-8 o col-lg-6 y se usa mx-auto para centrar el formulario -->
        <main class="container py-5">
            <div class="row justify-content-center">

                <!-- TARJETA DE FORMULARIO (CENTRADA) -->
                <div class="col-md-8 col-lg-6">
                    <!-- Se cambia bg-light por un estilo inline para un gris un poco más oscuro (lightgrey / #e9ecef) -->
                    <div class="p-4 rounded shadow-sm" style="background-color: #f1f3f5; border: 1px solid #dee2e6;">
                        <h5 class="fw-bold mb-3 text-center">Redacta tu mensaje</h5>
                        <p class="text-muted mb-4 text-center">Redacta el contenido del correo para el destinatario.</p>

                        <!-- Mensajes de éxito o error -->
                        <div th:if="${mensaje}"
                            th:class="'alert alert-' + (${tipoMensaje == 'success' ? 'success' : 'danger'}) + ' text-center'"
                            th:text="${mensaje}">
                        </div>

                        <form th:action="@{/correo/enviar-desde-vista}" method="post" class="row g-3">

                            <div class="col-12">
                                <label class="form-label fw-semibold">Para</label>
                                <input type="email" name="para" class="form-control shadow-sm"
                                    placeholder="destinatario@ejemplo.com" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Asunto</label>
                                <input type="text" name="asunto" class="form-control shadow-sm"
                                    placeholder="Asunto del correo" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Mensaje</label>
                                <textarea name="mensaje" class="form-control shadow-sm" rows="5"
                                    placeholder="Escribe tu mensaje..." required></textarea>
                            </div>

                            <div class="col-12 text-center mt-4">
                                <!-- Botón centrado -->
                                <button type="submit" class="btn btn-dark px-5 rounded-pill shadow">
                                    <i class="fas fa-paper-plane me-2"></i>Enviar Correo
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </main>

    </section>
</body>

</html>
