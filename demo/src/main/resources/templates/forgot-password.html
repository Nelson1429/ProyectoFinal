<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <style>
        .forgot-card {
            max-width: 600px;
            width: 90%;
            margin: auto;
        }

        .btn-custom {
            padding: 12px;
            font-weight: 500;
        }
    </style>
</head>

<body class="no-footer">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 navbar-lg fixed-top">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/imagenes/logo-sabor1.jpg}" height="90" class="me-2" />
            <span class="fs-4">S a b o r M a s t e r C l a s s</span>
        </a>
    </nav>

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center login-container">
        <div class="card shadow p-5 forgot-card">
            <div class="card-body">
                <h1 class="mb-4 text-center">Recuperar Contraseña</h1>
                <p class="text-muted text-center mb-4">
                    Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
                </p>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="mb-4">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email"
                            placeholder="tucorreo@ejemplo.com" required />
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-dark btn-custom w-100">Enviar Enlace</button>

                        <a th:href="@{/login}" class="btn btn-outline-dark btn-custom w-100">
                            <i class="fas fa-arrow-left me-1"></i> Volver al Login
                        </a>
                    </div>

                    <!-- Mensajes -->
                    <div class="mt-3 text-center text-danger" th:if="${error}">
                        <span th:text="${error}"></span>
                    </div>
                    <div class="mt-3 text-center text-success" th:if="${mensaje}">
                        <span th:text="${mensaje}"></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-center fixed-bottom">
        <div class="container d-flex justify-content-center gap-4 py-3">
            <i class="fab fa-whatsapp text-white fs-4"></i>
            <i class="fab fa-facebook text-white fs-4"></i>
            <i class="fab fa-x-twitter text-white fs-4"></i>
            <i class="fab fa-instagram text-white fs-4"></i>
            <i class="fab fa-youtube text-white fs-4"></i>
            <i class="fab fa-tiktok text-white fs-4"></i>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
