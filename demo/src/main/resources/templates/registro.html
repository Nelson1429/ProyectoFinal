<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Sabor MasterClass</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/registro.css}">

  <style>
    .error {
      color: red;
      font-size: 0.8rem;
      margin: 4px 0 8px 0;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container-fluid vh-100">
    <div class="row h-100">

      <!-- Formulario -->
      <div class="col-md-6 d-flex align-items-center justify-content-center">
        <div class="card shadow w-75 p-4">
          <div class="card-body">

            <h1 class="mb-4 text-center">Regístrate</h1>

            <form th:action="@{/registro}" th:object="${persona}" method="post">

              <!-- Tipo de documento -->
              <div class="mb-3">
                <select class="form-control" th:field="*{tipoDocumento}" required>
                  <option value="">Seleccione tipo de documento</option>
                  <option value="CC">Cédula de Ciudadanía</option>
                  <option value="TI">Tarjeta de Identidad</option>
                  <option value="CE">Cédula de Extranjería</option>
                </select>
                <span th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}" class="error"></span>
              </div>

              <!-- Documento -->
              <div class="mb-3">
                <input type="text" th:field="*{documento}" class="form-control"
                  placeholder="Número de documento" required>
                <span th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}" class="error"></span>
              </div>

              

              <!-- Género -->
              <div class="mb-3">
                <select class="form-control" th:field="*{genero}" required>
                  <option value="">Seleccione género</option>
                  <option value="Femenino">Femenino</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Otro">Otro</option>
                </select>
                <span th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}" class="error"></span>
              </div>

              <!-- Nombre -->
              <div class="mb-3">
                <input type="text" th:field="*{nombre}" class="form-control"
                  placeholder="Digite su nombre"
                  maxlength="30"
                  pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
                  title="Solo letras"
                  required />
                <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="error"></span>
              </div>

              <!-- Dirección -->
              <div class="mb-3">
                <input type="text" th:field="*{direccion}" class="form-control"
                  placeholder="Dirección" required />
                <span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}" class="error"></span>
              </div>

              <!-- Teléfono -->
              <div class="mb-3">
                <input type="text" th:field="*{telefono}" class="form-control"
                  placeholder="Teléfono (7 a 10 dígitos)"
                  pattern="\d{7,10}" required>
                <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="error"></span>
              </div>

              <!-- Rol -->
              <div class="mb-3">
                <select class="form-control" th:field="*{rolId}" required>
                  <option value="">Seleccione rol...</option>
                  <option value="1">Administrador</option>
                  <option value="2">Usuario</option>
                </select>
                <span th:if="${#fields.hasErrors('rolId')}" th:errors="*{rolId}" class="error"></span>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <input type="email" th:field="*{email}" class="form-control"
                  placeholder="Ingrese su correo" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
              </div>

              <!-- Contraseña -->
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{contrasena}" class="form-control" id="contrasena"
                  placeholder="Contraseña"
                  required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('contrasena', this)"></i>
                <span th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}" class="error"></span>
              </div>

              <!-- Confirmar contraseña -->
              <div class="mb-3 position-relative">
                <input type="password" th:field="*{confirmarContrasena}" class="form-control" id="confirmar"
                  placeholder="Confirme su contraseña" required />
                <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3"
                  onclick="mostrarContrasena('confirmar', this)"></i>
                <span th:if="${#fields.hasErrors('confirmarContrasena')}" th:errors="*{confirmarContrasena}" class="error"></span>
              </div>

              <!-- Acepta términos -->
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{aceptaTerminos}" required />
                <label class="form-check-label">Acepto términos y condiciones</label>
              </div>

              <!-- Botón registrar -->
              <button type="submit" class="btn btn-dark w-100">Crear Cuenta</button>

              <div class="mt-3 text-center">
                <a th:href="@{/login}" class="btn btn-outline-secondary me-2">Volver al Login</a>
                <a th:href="@{/home}" class="btn btn-outline-primary">Volver al Home</a>
              </div>

            </form>

          </div>
        </div>
      </div>

      <!-- Imagen -->
      <div class="col-md-6 image-section d-none d-md-block">
        <img th:src="@{/imagenes/pasta-794464_1280.jpg}" class="img-fluid">
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function mostrarContrasena(idCampo, icono) {
      const input = document.getElementById(idCampo);
      if (input.type === "password") {
        input.type = "text";
        icono.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        input.type = "password";
        icono.classList.replace("fa-eye-slash", "fa-eye");
      }
    }
  </script>

</body>
</html>
